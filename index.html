<!DOCTYPE html>
<html>
<head>
  <title>Yamuna Portfolio</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('skills')">Skills</a>
  <a onclick="showPage('certificates')">Certificates</a>
  <a onclick="showPage('contact')">Contact</a>
</nav>

<!-- HOME -->
<div id="home" class="container page active">
  <div class="card">
    <img src="images/profile.jpg" class="profile">
    <h1>Yamuna M</h1>
    <div class="typing" id="typing"></div>
  </div>
</div>

<!-- SKILLS -->
<div id="skills" class="container page">
  <div class="card">
    <h2>💻 Skills</h2>
    <p>HTML, CSS, JavaScript, Python, GitHub, Cloud Computing</p>

    <h2>🎓 Education</h2>
    <p>BCA in Cloud Computing</p>
    <p>Kristu Jayanti University</p>
  </div>
</div>

<!-- CERTIFICATES -->
<div id="certificates" class="container page">
  <div class="card">
    <h2>📜 Certificates</h2>
    <div class="certificates">
      <img src="images/Html_certificate2.jpeg" onclick="openModal(this.src)">
      <img src="images/Aws_certificate1.jpeg" onclick="openModal(this.src)">
      <img src="images/CSS_certificate3.jpeg" onclick="openModal(this.src)">
      <img src="images/Javascript_certificate4.jpeg" onclick="openModal(this.src)">
      <img src="images/Frontendweb_certificate5.jpeg" onclick="openModal(this.src)">
      <img src="images/NodesJs_certificate6.jpeg" onclick="openModal(this.src)">
      <img src="images/Gitandgithub_certificate7.jpeg" onclick="openModal(this.src)">
    </div>
  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="container page">
  <div class="card">
    <h2>📞 Contact</h2>
    <p>📧 yamuna.m2618@gmail.com</p>
    <p>🔗 linkedin.com/in/yamuna.m</p>
    <p>💻 github.com/yamuna2618-cyber</p>

    <h2>💬 Feedback</h2>

    <form id="feedbackForm">
      <input type="text" id="name" placeholder="Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <textarea id="message" placeholder="Message" required></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span onclick="closeModal()">&times;</span>
  <img id="modalImg">
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
